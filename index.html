<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="themeBtn">🌙 다크 모드</button>
    </div>
    
    <h1>🎲 로또 번호 추천기</h1>
    <p class="sub">
      버튼을 누르면 로또 번호 5세트를 추천해드립니다.<br />
      각 세트는 1~45 중 중복 없는 6개 번호로 생성됩니다.
    </p>

    <div class="actions">
      <button id="generateBtn">번호 추천받기</button>
    </div>

    <div id="results" class="results"></div>

    <div class="footer">재미로만 참고해 주세요 😄</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
