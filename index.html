<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #0f172a;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      padding: 32px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      text-align: center;
    }

    .sub {
      margin: 0 0 28px;
      text-align: center;
      color: #475569;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:active {
      transform: translateY(1px);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .set {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
    }

    .set-title {
      font-weight: 700;
      margin-bottom: 12px;
      color: #1e293b;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
    }

    .range-1-10 { background: #f59e0b; }
    .range-11-20 { background: #3b82f6; }
    .range-21-30 { background: #ef4444; }
    .range-31-40 { background: #6b7280; }
    .range-41-45 { background: #22c55e; }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #64748b;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .container {
        padding: 22px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .ball {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 로또 번호 추천기</h1>
    <p class="sub">
      버튼을 누르면 로또 번호 5세트를 추천해드립니다.<br />
      각 세트는 1~45 중 중복 없는 6개 번호로 생성됩니다.
    </p>

    <div class="actions">
      <button id="generateBtn">번호 추천받기</button>
    </div>

    <div id="results" class="results"></div>

    <div class="footer">재미로만 참고해 주세요 😄</div>
  </div>

  <script>
    const resultsEl = document.getElementById('results');
    const generateBtn = document.getElementById('generateBtn');

    function getBallClass(number) {
      if (number <= 10) return 'range-1-10';
      if (number <= 20) return 'range-11-20';
      if (number <= 30) return 'range-21-30';
      if (number <= 40) return 'range-31-40';
      return 'range-41-45';
    }

    function generateOneSet() {
      const numbers = new Set();

      while (numbers.size < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;
        numbers.add(randomNumber);
      }

      return [...numbers].sort((a, b) => a - b);
    }

    function renderSets() {
      resultsEl.innerHTML = '';

      for (let i = 1; i <= 5; i++) {
        const setNumbers = generateOneSet();

        const setEl = document.createElement('div');
        setEl.className = 'set';

        const titleEl = document.createElement('div');
        titleEl.className = 'set-title';
        titleEl.textContent = `${i}번 추천`;

        const ballsEl = document.createElement('div');
        ballsEl.className = 'balls';

        setNumbers.forEach((number) => {
          const ballEl = document.createElement('div');
          ballEl.className = `ball ${getBallClass(number)}`;
          ballEl.textContent = number;
          ballsEl.appendChild(ballEl);
        });

        setEl.appendChild(titleEl);
        setEl.appendChild(ballsEl);
        resultsEl.appendChild(setEl);
      }
    }

    generateBtn.addEventListener('click', renderSets);

    renderSets();
  </script>
</body>
</html>
