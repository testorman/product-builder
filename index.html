<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="themeBtn">🌙 다크 모드</button>
    </div>
    
    <h1>🎲 로또 번호 추천기</h1>
    <p class="sub">
      버튼을 누르면 로또 번호 5세트를 추천해드립니다.<br />
      각 세트는 1~45 중 중복 없는 6개 번호로 생성됩니다.
    </p>

    <div class="actions">
      <button id="generateBtn">번호 추천받기</button>
    </div>

    <div id="results" class="results"></div>

    <hr class="divider">

    <div class="partnership-section">
      <h3>🤝 제휴 문의</h3>
      <p class="form-sub">비즈니스 제휴 및 협업 문의는 아래 양식을 작성해 주세요.</p>
      <form action="https://formspree.io/f/mjgpenda" method="POST" class="partnership-form">
        <div class="form-group">
          <label for="name">이름/업체명</label>
          <input type="text" id="name" name="name" required placeholder="이름 또는 업체명을 입력하세요">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" required placeholder="답변 받을 이메일을 입력하세요">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="문의하실 내용을 상세히 적어주세요"></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </div>

    <div class="footer">재미로만 참고해 주세요 😄</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
